naftiko: "1.0.0-alpha1"

info:
  label: Unpaywall API
  description: >-
    Unpaywall REST API providing free programmatic access to open access status
    for 120M+ scholarly articles identified by DOI. Returns OA locations, license
    information, host type (publisher/repository), and version metadata.
    Rate limit: 100,000 calls per day. Authentication via email query parameter.
  tags:
    - Unpaywall
    - Open Access
    - Scholarly Articles
    - Research
    - DOI
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNPAYWALL_EMAIL: UNPAYWALL_EMAIL

capability:
  consumes:
    - type: http
      namespace: unpaywall
      baseUri: https://api.unpaywall.org/v2
      description: Unpaywall API for open access scholarly article discovery

      resources:
        - name: doi-lookup
          path: /
          description: Look up open access status by DOI
          operations:
            - name: get-by-doi
              method: GET
              description: Get Open Access Status by DOI
              inputParameters:
                - name: doi
                  in: path
                  type: string
                  required: true
                  description: Article DOI (e.g., 10.1038/nature12373)
                - name: email
                  in: query
                  type: string
                  required: true
                  description: Your email address (required for identification)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: search
          path: /search/
          description: Search articles by title
          operations:
            - name: search-by-title
              method: GET
              description: Search Articles by Title
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: true
                  description: Title search query
                - name: email
                  in: query
                  type: string
                  required: true
                  description: Your email address (required)
                - name: is_oa
                  in: query
                  type: boolean
                  required: false
                  description: Filter to open access only
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number (50 results per page)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: unpaywall-rest
      resources:
        - path: /v1/articles/{doi}
          name: article
          description: Look up article by DOI
          operations:
            - method: GET
              name: get-article
              description: Get open access status for an article by DOI
              call: "unpaywall.get-by-doi"
              with:
                doi: "rest.doi"
                email: "rest.email"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/articles
          name: article-search
          description: Search articles by title
          operations:
            - method: GET
              name: search-articles
              description: Search articles by title
              call: "unpaywall.search-by-title"
              with:
                query: "rest.query"
                email: "rest.email"
                is_oa: "rest.is_oa"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: unpaywall-mcp
      transport: http
      tools:
        - name: get-oa-status
          description: Get open access status and full-text locations for a scholarly article by DOI
          hints:
            readOnly: true
            openWorld: true
          call: "unpaywall.get-by-doi"
          with:
            doi: "tools.doi"
            email: "tools.email"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-articles
          description: Search Unpaywall database by article title to find open access versions
          hints:
            readOnly: true
            openWorld: true
          call: "unpaywall.search-by-title"
          with:
            query: "tools.query"
            email: "tools.email"
            is_oa: "tools.is_oa"
          outputParameters:
            - type: object
              mapping: "$."
